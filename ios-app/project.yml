# XcodeGen spec — generates Redacta.xcodeproj.
#
#   brew install xcodegen          # one-time
#   cd ios-app && xcodegen generate
#   open Redacta.xcodeproj
#
# Two targets share the same engine sources (RedactaEngine/) and the bundled
# JS engine (Resources/redacta.bundle.js), so iOS reuses the exact engine that
# powers the skill, MCP server, CLI and FigJam/Miro plugins.

name: Redacta
options:
  bundleIdPrefix: com.medcopywriter
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

# Tells Xcode the project was last checked at a recent version, so it stops
# showing the "Update to recommended settings" prompt after each regenerate.
attributes:
  LastUpgradeCheck: "1700"
  LastSwiftUpdateCheck: "1700"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    # iPhone-only (device family 1). Revisit for the iPad-polish phase.
    TARGETED_DEVICE_FAMILY: "1"
    # Keep the built Info.plist as XML — the App Intents Siri-training tool
    # (appintentsnltrainingprocessor) fails to parse the default binary plist
    # with "Unable to parse Info.plist".
    INFOPLIST_OUTPUT_FORMAT: xml
    # ↓ Apple Developer Team ID — Medcopywriter Limited.
    DEVELOPMENT_TEAM: "3H2VBLFN4M"
    CODE_SIGN_STYLE: Automatic
    # Xcode "recommended settings": sandbox run-script phases for build
    # correctness. Safe here — no target uses custom run-script phases.
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # iPhone-only (1). iPad (2) would require supporting all orientations or
    # UIRequiresFullScreen; Redacta is an iPhone-first utility. Revisit for iPad.
    TARGETED_DEVICE_FAMILY: "1"

# Files shared by every target.
targetTemplates:
  EngineConsumer:
    sources:
      - path: Shared
      - path: RedactaEngine
        excludes:
          - "entry.mjs"
          - "build-bundle.mjs"

targets:
  RedactaApp:
    type: application
    platform: iOS
    templates: [EngineConsumer]
    sources:
      - path: RedactaApp
        excludes:
          - "Fonts/**"
      # Bundle only the brand-font cuts actually referenced by BrandFont.swift.
      - path: RedactaApp/Fonts/Poppins-Light.ttf
      - path: RedactaApp/Fonts/Poppins-Regular.ttf
      - path: RedactaApp/Fonts/Poppins-Medium.ttf
      - path: RedactaApp/Fonts/Poppins-SemiBold.ttf
      - path: RedactaApp/Fonts/Poppins-Bold.ttf
      - path: RedactaApp/Fonts/JetBrainsMono-Regular.ttf
      - path: RedactaApp/Fonts/JetBrainsMono-Medium.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcopywriter.redacta
        INFOPLIST_FILE: RedactaApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: RedactaApp/RedactaApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: RedactaShareExtension
      - target: RedactaWidget

  RedactaShareExtension:
    type: app-extension
    platform: iOS
    templates: [EngineConsumer]
    sources:
      - path: RedactaShareExtension
      - path: RedactaApp/PrivacyInfo.xcprivacy
      # Reuse the app's brand kit + fonts so the share sheet matches the app.
      - path: RedactaApp/Brand
      - path: RedactaApp/Fonts/Poppins-Light.ttf
      - path: RedactaApp/Fonts/Poppins-Regular.ttf
      - path: RedactaApp/Fonts/Poppins-Medium.ttf
      - path: RedactaApp/Fonts/Poppins-SemiBold.ttf
      - path: RedactaApp/Fonts/Poppins-Bold.ttf
      - path: RedactaApp/Fonts/JetBrainsMono-Regular.ttf
      - path: RedactaApp/Fonts/JetBrainsMono-Medium.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcopywriter.redacta.share
        INFOPLIST_FILE: RedactaShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: RedactaShareExtension/RedactaShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO

  # WidgetKit extension. iOS 17+ (interactive widgets); reuses the engine, brand
  # kit and the RedactClipboardIntent. REDACTA_WIDGET excludes the app's
  # AppShortcutsProvider from this target.
  RedactaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    templates: [EngineConsumer]
    sources:
      - path: RedactaWidget
      - path: RedactaApp/PrivacyInfo.xcprivacy
      - path: RedactaApp/Brand
      - path: RedactaApp/RedactaAppIntents.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcopywriter.redacta.widget
        INFOPLIST_FILE: RedactaWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: RedactaWidget/RedactaWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: REDACTA_WIDGET
        # Interactive widgets need iOS 17; only this target is raised (app stays 16).
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
