    <text x="425" y="402" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5A6CB0">redact in any app</text>

    <rect x="320" y="432" width="210" height="52" rx="12" fill="#EEF1FF" stroke="#C4D0FF"/>
    <text x="425" y="453" text-anchor="middle" fill="#1A2A8C">Home-Screen widget</text>
    <text x="425" y="470" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5A6CB0">iOS 17 · one tap</text>
  </g>

  <!-- C3: Python mirror -->
  <g font-size="13" font-weight="600">
    <rect x="590" y="296" width="210" height="52" rx="12" fill="#FFFFFF" stroke="#E9EDF6"/>
    <text x="695" y="317" text-anchor="middle" fill="#2A3247">Python library</text>
    <text x="695" y="334" text-anchor="middle" font-size="10.5" font-weight="400" fill="#8B96AC">pip install redacta</text>
