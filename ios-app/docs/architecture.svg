<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" role="img" aria-labelledby="t d" font-family="Poppins, ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title id="t">Redacta — one engine, many surfaces</title>
  <desc id="d">A single TypeScript redaction engine feeds eight surfaces: directly in Node/TS (MCP server, CLI, TypeScript library, FigJam plugin, Miro app), on-device via JavaScriptCore (iOS app, Share Extension, Home-Screen widget), mirrored in Python, and as a Claude agent skill.</desc>

  <rect x="1" y="1" width="1118" height="698" rx="24" fill="#FFFFFF" stroke="#E9EDF6"/>

  <!-- Heading -->
  <text x="560" y="48" text-anchor="middle" font-size="25" font-weight="700" fill="#0B0F1C" letter-spacing="-0.3">Redacta — one engine, many surfaces</text>
  <text x="560" y="74" text-anchor="middle" font-size="13.5" fill="#5F6B82">One detection engine. Eight surfaces. The iOS family runs it on-device.</text>

  <!-- Source engine -->
  <rect x="360" y="96" width="400" height="92" rx="16" fill="#2036F5"/>
  <text x="560" y="131" text-anchor="middle" font-size="16.5" font-weight="700" fill="#FFFFFF">Redacta detection engine</text>
  <text x="560" y="153" text-anchor="middle" font-size="11.5" fill="#FFFFFF" opacity="0.92">TypeScript · @pharmatools/redacta · npm-package/</text>
  <text x="560" y="171" text-anchor="middle" font-size="10.5" fill="#FFFFFF" opacity="0.8">NHS Mod-11 · NI · Luhn · names · HIPAA Safe Harbor</text>

  <!-- Connectors source → method pills -->
  <path d="M560,188 C560,214 155,206 155,232" fill="none" stroke="#CBD3E1" stroke-width="1.5"/>
