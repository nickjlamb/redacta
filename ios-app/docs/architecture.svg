  <!-- Footnotes for the single-box columns -->
  <text x="695" y="384" text-anchor="middle" font-size="10.5" fill="#A6B0C2">mirrors the engine for pip users</text>
  <text x="965" y="384" text-anchor="middle" font-size="10.5" fill="#A6B0C2">patterns + LLM reasoning</text>

  <text x="560" y="664" text-anchor="middle" font-size="12" fill="#5F6B82">The detection logic lives in one place — every surface consumes it. Built by PharmaTools.AI · MIT-0</text>
