  <path d="M560,188 C560,214 695,206 695,232" fill="none" stroke="#CBD3E1" stroke-width="1.5"/>
  <path d="M560,188 C560,214 965,206 965,232" fill="none" stroke="#CBD3E1" stroke-width="1.5"/>

  <!-- Method pills -->
  <rect x="50" y="232" width="210" height="44" rx="22" fill="#F4F6FB"/>
  <text x="155" y="259" text-anchor="middle" font-size="12.5" font-weight="600" fill="#404A60">Direct · Node / TS</text>

  <rect x="320" y="232" width="210" height="44" rx="22" fill="#2036F5"/>
  <text x="425" y="259" text-anchor="middle" font-size="12.5" font-weight="600" fill="#FFFFFF">JavaScriptCore · on-device</text>

  <rect x="590" y="232" width="210" height="44" rx="22" fill="#F4F6FB"/>
  <text x="695" y="259" text-anchor="middle" font-size="12.5" font-weight="600" fill="#404A60">Python mirror</text>

  <rect x="860" y="232" width="210" height="44" rx="22" fill="#F4F6FB"/>
  <text x="965" y="259" text-anchor="middle" font-size="12.5" font-weight="600" fill="#404A60">Agent skill</text>

